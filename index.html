<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>POPO Mock</title>
  <style>
    :root {
      --outer-bg: #ffffff;
      --phone-bg: #000000;
      --text: rgba(255,255,255,0.96);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--outer-bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .device-shell {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      background: var(--phone-bg);
      touch-action: none;
      cursor: grab;
    }

    .device-shell.dragging {
      cursor: grabbing;
    }

    @media (min-aspect-ratio: 5/7) {
      .device-shell {
        width: min(100vw, 430px);
        height: min(100svh, calc(min(100vw, 430px) * 2));
        max-height: 100svh;
        border-radius: 36px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.16);
      }
    }

    .permission-layer,
    .stage,
    .toast {
      position: absolute;
      inset: 0;
    }

    .permission-layer {
      display: grid;
      place-items: center;
      padding: 24px;
      background: #000;
      color: rgba(255,255,255,0.84);
      text-align: center;
      font-size: 16px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      z-index: 20;
    }

    .stage {
      background: #000;
      overflow: hidden;
      z-index: 1;
    }

    .track {
      position: absolute;
      inset: 0;
      height: 300%;
      transform: translateY(-33.333333%);
      will-change: transform;
    }

    .track.animated {
      transition: transform 220ms ease;
    }

    .panel {
      position: relative;
      width: 100%;
      height: 33.333333%;
      overflow: hidden;
    }

    .room-panel {
      background: #000;
    }

    .room-inner {
      position: absolute;
      inset: 0;
    }

    .wave-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .people {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      width: min(82%, 320px);
      min-height: 40px;
      pointer-events: none;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      border: 1px solid rgba(255,255,255,0.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .avatar.speaking {
      transform: scale(1.10);
      box-shadow: 0 0 0 7px rgba(255,255,255,0.06);
    }

    .ad-panel {
      background:
        repeating-linear-gradient(
          -45deg,
          #ff006e 0px, #ff006e 32px,
          #ffbe0b 32px, #ffbe0b 64px,
          #3a86ff 64px, #3a86ff 96px,
          #00f5d4 96px, #00f5d4 128px,
          #8338ec 128px, #8338ec 160px
        );
    }

    .ad-noise {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), transparent 22%, transparent 78%, rgba(0,0,0,0.10)),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.28), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.18), transparent 34%);
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    .ad-inner {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: #000000;
    }

    .ad-text {
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      font-size: clamp(56px, 20vw, 108px);
      text-shadow: 0 2px 0 rgba(255,255,255,0.24);
      white-space: nowrap;
    }


    .toast {
      inset: auto 50% calc(16px + var(--safe-bottom)) auto;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      min-width: 120px;
      max-width: min(78%, 240px);
      padding: 10px 12px;
      border-radius: 14px;
      text-align: center;
      color: rgba(255,255,255,0.88);
      background: rgba(14,14,14,0.96);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      line-height: 1.5;
      z-index: 10;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="device-shell" id="deviceShell">
    <div class="permission-layer" id="permissionLayer">マイクを許可してください</div>
    <div class="stage hidden" id="stage">
      <div class="track" id="track"></div>
    </div>
    <div class="toast" id="toast"></div>
  </main>

  <script>
    const USERS = [
      makeUser(1, 'A', '#ff5d73', 1200, 2600, 198),
      makeUser(2, 'B', '#4d7cff', 1800, 3600, 228),
      makeUser(3, 'C', '#27c89a', 800, 1900, 264),
      makeUser(4, 'D', '#ff9f1c', 2400, 4800, 186),
      makeUser(5, 'E', '#9b5cff', 1000, 3000, 318)
    ];

    const AD_TEXTS = [
      { title: '広告' },
      { title: '広告' },
      { title: '広告' }
    ];

    const state = {
      history: [],
      currentIndex: 0,
      activeScene: null,
      roomTimers: [],
      activeAudios: new Set(),
      presenceTimer: null,
      audioContext: null,
      audioUnlocked: false,
      audioLoadingPromise: null,
      audioBuffers: new Map(),
      micAnalyser: null,
      micData: null,
      micLevel: 0,
      remoteBurst: 0,
      raf: null,
      drag: {
        active: false,
        pointerId: null,
        startY: 0,
        deltaY: 0,
        locked: false
      },
      sceneCursor: 0,
      toastTimer: null
    };

    const permissionLayer = document.getElementById('permissionLayer');
    const stage = document.getElementById('stage');
    const track = document.getElementById('track');
    const deviceShell = document.getElementById('deviceShell');
    const toast = document.getElementById('toast');

    window.addEventListener('load', init);
    window.addEventListener('resize', renderTrack);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopRoomAudio();
      else enterCurrentScene(false);
    });

    async function init() {
      setupPointerSwipe();
      const Context = window.AudioContext || window.webkitAudioContext;
      if (Context) state.audioContext = new Context();
      await requestMic();
      window.POPO_TEST = {
        next: goNext,
        prev: goPrev,
        scene: () => state.activeScene,
        startDemo: () => {
          permissionLayer.classList.add('hidden');
          stage.classList.remove('hidden');
          if (state.history.length === 0) {
            state.history.push(buildScene());
            renderTrack();
            enterCurrentScene(true);
            animate();
          }
        }
      };
    }

    async function requestMic() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        setupMic(stream);
        startApp();
      } catch (error) {
        console.error(error);
        permissionLayer.classList.remove('hidden');
      }
    }

    permissionLayer.addEventListener('pointerdown', async () => {
      await unlockAudio();
      await requestMic();
    });

    function startApp() {
      permissionLayer.classList.add('hidden');
      stage.classList.remove('hidden');
      state.audioContext?.resume?.();

      if (state.history.length === 0) {
        state.history.push(buildScene());
        renderTrack();
        enterCurrentScene(true);
        animate();
      }
    }

    function setupMic(stream) {
      if (!state.audioContext) return;
      const source = state.audioContext.createMediaStreamSource(stream);
      const analyser = state.audioContext.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.72;
      source.connect(analyser);
      state.micAnalyser = analyser;
      state.micData = new Uint8Array(analyser.fftSize);
    }

    async function unlockAudio() {
      if (!state.audioContext) return;
      try {
        await state.audioContext.resume();
      } catch (error) {
        console.error(error);
      }
      if (state.audioUnlocked) return;
      state.audioUnlocked = true;
      if (!state.audioLoadingPromise) {
        state.audioLoadingPromise = loadAllAudioBuffers();
      }
      return state.audioLoadingPromise;
    }

    async function loadAllAudioBuffers() {
      const uniquePaths = Array.from(new Set(USERS.flatMap((user) => user.audioFiles)));
      await Promise.all(uniquePaths.map((path) => loadAudioBuffer(path)));
    }

    async function loadAudioBuffer(path) {
      if (!state.audioContext || state.audioBuffers.has(path)) return state.audioBuffers.get(path) || null;
      try {
        const response = await fetch(path, { cache: 'force-cache' });
        if (!response.ok) return null;
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await decodeBuffer(arrayBuffer);
        if (audioBuffer) state.audioBuffers.set(path, audioBuffer);
        return audioBuffer || null;
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function decodeBuffer(arrayBuffer) {
      return new Promise((resolve, reject) => {
        try {
          state.audioContext.decodeAudioData(arrayBuffer.slice(0), resolve, reject);
        } catch (error) {
          reject(error);
        }
      }).catch((error) => {
        console.error(error);
        return null;
      });
    }

    function buildScene() {
      const index = state.sceneCursor;
      state.sceneCursor += 1;
      if (index > 0 && index % 5 === 3) return buildAdScene(index);
      return buildRoomScene(index);
    }

    function buildAdScene(index) {
      return {
        id: `ad-${index}`,
        type: 'ad',
        payload: AD_TEXTS[index % AD_TEXTS.length]
      };
    }

    function buildRoomScene(index) {
      const random = seeded(index + 41);
      const countOptions = [0, 2, 1, 4, 3, 5, 2, 4, 1, 3, 5];
      const remoteCount = countOptions[index % countOptions.length];
      const remoteUsers = pickUsers(remoteCount, random).map((user) => ({
        ...user,
        jitter: 0.78 + random() * 0.64,
        density: 0.78 + random() * 0.48,
        introBias: random() * 700
      }));
      return {
        id: `room-${index}`,
        type: 'room',
        remoteUsers,
        currentUsers: null
      };
    }

    function renderTrack() {
      if (state.history.length === 0) return;
      const prevScene = state.history[state.currentIndex - 1];
      const currentScene = state.history[state.currentIndex];
      let nextScene = state.history[state.currentIndex + 1];
      if (!nextScene) {
        nextScene = buildScene();
        state.history.push(nextScene);
      }

      track.innerHTML = '';
      track.appendChild(renderPanel(prevScene || null));
      track.appendChild(renderPanel(currentScene));
      track.appendChild(renderPanel(nextScene || null));
      resetTrackPosition(false);
    }

    function renderPanel(scene) {
      const panel = document.createElement('section');
      panel.className = 'panel';
      if (!scene) {
        panel.style.background = '#000';
        return panel;
      }
      panel.dataset.sceneId = scene.id;
      panel.classList.add(scene.type === 'ad' ? 'ad-panel' : 'room-panel');

      if (scene.type === 'ad') {
        panel.innerHTML = `
          <div class="ad-noise"></div>
          <div class="ad-inner">
            <div class="ad-text">${scene.payload.title}</div>
          </div>
        `;
      } else {
        panel.innerHTML = `
          <div class="room-inner">
            <canvas class="wave-canvas" data-role="wave"></canvas>
            <div class="people">
              ${renderAvatars(scene.currentUsers || scene.remoteUsers)}
            </div>
          </div>
        `;
      }
      return panel;
    }

    function setupPointerSwipe() {
      deviceShell.addEventListener('pointerdown', onPointerDown);
      deviceShell.addEventListener('pointermove', onPointerMove);
      deviceShell.addEventListener('pointerup', onPointerUp);
      deviceShell.addEventListener('pointercancel', onPointerUp);
      deviceShell.addEventListener('lostpointercapture', onPointerUp);
    }

    function onPointerDown(event) {
      if (!permissionLayer.classList.contains('hidden')) return;
      if (state.drag.locked) return;
      unlockAudio();
      state.drag.active = true;
      state.drag.pointerId = event.pointerId;
      state.drag.startY = event.clientY;
      state.drag.deltaY = 0;
      deviceShell.classList.add('dragging');
      deviceShell.setPointerCapture?.(event.pointerId);
      track.classList.remove('animated');
    }

    function onPointerMove(event) {
      if (!state.drag.active || event.pointerId !== state.drag.pointerId) return;
      state.drag.deltaY = event.clientY - state.drag.startY;
      const limited = clamp(state.drag.deltaY, -deviceShell.clientHeight * 0.38, deviceShell.clientHeight * 0.38);
      track.style.transform = `translateY(calc(-33.333333% + ${limited}px))`;
      event.preventDefault();
    }

    function onPointerUp(event) {
      if (!state.drag.active) return;
      if (event.pointerId !== state.drag.pointerId && state.drag.pointerId !== null) return;
      const delta = state.drag.deltaY;
      const threshold = Math.max(70, deviceShell.clientHeight * 0.12);
      state.drag.active = false;
      state.drag.pointerId = null;
      state.drag.deltaY = 0;
      deviceShell.classList.remove('dragging');
      if (state.drag.locked) return;

      if (delta <= -threshold) {
        goNext();
      } else if (delta >= threshold) {
        goPrev();
      } else {
        snapBack();
      }
    }

    function snapBack() {
      track.classList.add('animated');
      track.style.transform = 'translateY(-33.333333%)';
      window.setTimeout(() => track.classList.remove('animated'), 240);
    }

    function goNext() {
      state.drag.locked = true;
      stopRoomAudio();
      track.classList.add('animated');
      track.style.transform = 'translateY(-66.666667%)';
      window.setTimeout(() => {
        state.currentIndex += 1;
        if (!state.history[state.currentIndex + 1]) state.history.push(buildScene());
        renderTrack();
        enterCurrentScene(true);
        unlockDrag();
      }, 230);
    }

    function goPrev() {
      if (state.currentIndex === 0) {
        snapBack();
        return;
      }
      state.drag.locked = true;
      stopRoomAudio();
      track.classList.add('animated');
      track.style.transform = 'translateY(0%)';
      window.setTimeout(() => {
        state.currentIndex -= 1;
        renderTrack();
        enterCurrentScene(true);
        unlockDrag();
      }, 230);
    }

    function unlockDrag() {
      window.setTimeout(() => {
        state.drag.locked = false;
      }, 20);
    }

    function resetTrackPosition(animated) {
      track.classList.toggle('animated', animated);
      track.style.transform = 'translateY(-33.333333%)';
      resizeVisibleCanvas();
    }

    function enterCurrentScene(withEnterSound) {
      stopRoomAudio();
      state.activeScene = state.history[state.currentIndex];
      resizeVisibleCanvas();
      if (!state.activeScene) return;
      if (state.activeScene.type === 'room') {
        if (!Array.isArray(state.activeScene.currentUsers)) {
          state.activeScene.currentUsers = state.activeScene.remoteUsers.map((user) => ({ ...user }));
        }
        syncPeopleUI(state.activeScene);
        if (withEnterSound) playEnterSound();
        scheduleRoom(state.activeScene);
        schedulePresenceLoop(state.activeScene);
      }
    }

    function scheduleRoom(scene) {
      const panel = track.children[1];
      const currentUsers = scene.currentUsers || [];
      if (!panel || scene.type !== 'room' || currentUsers.length === 0) return;
      const clustered = currentUsers.length >= 4;
      currentUsers.forEach((user, index) => {
        scheduleUser(scene, panel, user, index, clustered);
      });
    }

    function scheduleUser(scene, panel, user, index, clustered) {
      const initialDelay = Math.max(120, Math.floor(user.minDelay * 0.35) + user.introBias - index * 120);
      const timer = window.setTimeout(() => {
        if (state.activeScene?.id !== scene.id || !isUserInScene(scene, user.id)) return;
        playUtterance(panel, user, (scene.currentUsers || []).length);
        loopUser(scene, panel, user, clustered);
      }, initialDelay);
      state.roomTimers.push(timer);
    }

    function loopUser(scene, panel, user, clustered) {
      const densityFactor = clustered ? 0.82 : 1;
      const nextDelay = randomInt(
        Math.floor(user.minDelay * user.jitter * densityFactor),
        Math.floor(user.maxDelay * user.density * densityFactor)
      );
      const timer = window.setTimeout(() => {
        if (state.activeScene?.id !== scene.id || !isUserInScene(scene, user.id)) return;
        playUtterance(panel, user, (scene.currentUsers || []).length);
        loopUser(scene, panel, user, (scene.currentUsers || []).length >= 4);
      }, nextDelay);
      state.roomTimers.push(timer);
    }

    function playUtterance(panel, user, roomSize) {
      markSpeaker(panel, user.id, true);
      state.remoteBurst = Math.max(state.remoteBurst, 0.26 + Math.min(0.74, roomSize * 0.11));

      const clipPath = pickOne(user.audioFiles);
      const handle = playBufferedClip(clipPath, Math.min(1, 0.66 + roomSize * 0.04));
      if (handle) {
        state.activeAudios.add(handle);
        handle.source.addEventListener('ended', () => {
          markSpeaker(panel, user.id, false);
          state.activeAudios.delete(handle);
        }, { once: true });
      } else {
        markSpeaker(panel, user.id, false);
        loadAudioBuffer(clipPath);
      }

      window.setTimeout(() => markSpeaker(panel, user.id, false), randomInt(700, 1180));
    }

    function playBufferedClip(path, volume = 1) {
      if (!state.audioContext || !state.audioUnlocked) return null;
      const buffer = state.audioBuffers.get(path);
      if (!buffer) return null;
      const source = state.audioContext.createBufferSource();
      const gain = state.audioContext.createGain();
      gain.gain.value = volume;
      source.buffer = buffer;
      source.connect(gain);
      gain.connect(state.audioContext.destination);
      source.start();
      return { source, gain };
    }

    function playEnterSound() {
      if (!state.audioContext || !state.audioUnlocked) return;
      const now = state.audioContext.currentTime;
      const gain = state.audioContext.createGain();
      const osc = state.audioContext.createOscillator();
      const filter = state.audioContext.createBiquadFilter();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(620, now);
      osc.frequency.exponentialRampToValueAtTime(420, now + 0.09);
      filter.type = 'lowpass';
      filter.frequency.value = 1500;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.035, now + 0.014);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(state.audioContext.destination);

      osc.start(now);
      osc.stop(now + 0.12);
    }

    function stopRoomAudio() {
      clearRoomTimers();
      if (state.presenceTimer) {
        clearTimeout(state.presenceTimer);
        state.presenceTimer = null;
      }
      state.remoteBurst = 0;
      state.activeAudios.forEach((handle) => {
        try {
          handle.source.stop(0);
        } catch (error) {
          console.error(error);
        }
      });
      state.activeAudios.clear();
      document.querySelectorAll('.avatar.speaking').forEach((node) => node.classList.remove('speaking'));
    }

    function clearRoomTimers() {
      state.roomTimers.forEach((timer) => clearTimeout(timer));
      state.roomTimers = [];
    }

    function schedulePresenceLoop(scene) {
      if (scene.type !== 'room') return;
      if (state.presenceTimer) clearTimeout(state.presenceTimer);
      const delay = randomInt(4200, 6200);
      state.presenceTimer = window.setTimeout(() => {
        if (state.activeScene?.id !== scene.id) return;
        mutatePresence(scene);
        syncPeopleUI(scene);
        clearRoomTimers();
        scheduleRoom(scene);
        schedulePresenceLoop(scene);
      }, delay);
    }

    function mutatePresence(scene) {
      const current = Array.isArray(scene.currentUsers) ? scene.currentUsers : [];
      const presentIds = new Set(current.map((user) => user.id));
      const absent = USERS.filter((user) => !presentIds.has(user.id));
      const canAdd = absent.length > 0;
      const canRemove = current.length > 0;
      if (!canAdd && !canRemove) return;

      let action;
      if (!canRemove) action = 'add';
      else if (!canAdd) action = 'remove';
      else action = Math.random() < 0.56 ? 'add' : 'remove';

      if (action === 'add') {
        const base = absent[randomInt(0, absent.length - 1)];
        scene.currentUsers = [...current, {
          ...base,
          jitter: 0.78 + Math.random() * 0.64,
          density: 0.78 + Math.random() * 0.48,
          introBias: Math.random() * 420
        }];
        state.remoteBurst = Math.max(state.remoteBurst, 0.28);
      } else {
        const leaving = current[randomInt(0, current.length - 1)];
        scene.currentUsers = current.filter((user) => user.id !== leaving.id);
      }
    }

    function syncPeopleUI(scene) {
      const panel = track.children[1];
      if (!panel || scene.type !== 'room') return;
      const people = panel.querySelector('.people');
      if (!people) return;
      people.innerHTML = renderAvatars(scene.currentUsers || []);
    }

    function renderAvatars(users) {
      return users
        .map((user) => `<div class="avatar" data-user-id="${user.id}" style="background:${user.color}">${user.label}</div>`)
        .join('');
    }

    function isUserInScene(scene, userId) {
      return Array.isArray(scene.currentUsers) && scene.currentUsers.some((user) => user.id === userId);
    }

    function animate() {
      state.raf = requestAnimationFrame(animate);
      updateMicLevel();
      state.remoteBurst *= 0.94;
      const canvas = track.children[1]?.querySelector('[data-role="wave"]');
      if (!canvas) return;
      const roomSize = state.activeScene?.type === 'room' ? Math.max(1, state.activeScene.remoteUsers.length + 1) : 1;
      const activity = Math.min(1, 0.10 + state.micLevel * 1.15 + state.remoteBurst);
      drawWave(canvas, activity, roomSize);
    }

    function updateMicLevel() {
      if (!state.micAnalyser || !state.micData) {
        state.micLevel *= 0.9;
        return;
      }
      state.micAnalyser.getByteTimeDomainData(state.micData);
      let sum = 0;
      for (let i = 0; i < state.micData.length; i += 1) {
        const v = (state.micData[i] - 128) / 128;
        sum += v * v;
      }
      const rms = Math.sqrt(sum / state.micData.length);
      state.micLevel = Math.max(0, Math.min(1, rms * 4.2));
    }

    function drawWave(canvas, activity, roomSize) {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.floor(canvas.clientWidth * dpr);
      const height = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }

      const ctx = canvas.getContext('2d');
      if (!ctx) return;
      ctx.clearRect(0, 0, width, height);

      const midY = height / 2;
      const amp = Math.max(8 * dpr, (12 + activity * 34 + roomSize * 2) * dpr);
      const samples = 160;
      const time = performance.now() * 0.0016;

      ctx.strokeStyle = 'rgba(255,255,255,0.96)';
      ctx.lineWidth = Math.max(2, 2.2 * dpr);
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';

      const drawLine = (direction) => {
        ctx.beginPath();
        for (let i = 0; i <= samples; i += 1) {
          const t = i / samples;
          const x = t * width;
          const envelope = Math.pow(Math.sin(t * Math.PI), 1.35);
          const wobble =
            Math.sin(t * 8.5 + time) * 0.58 +
            Math.sin(t * 19 + time * 1.35) * 0.22;
          const y = midY + direction * envelope * wobble * amp;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      };

      drawLine(-1);
      drawLine(1);

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = Math.max(1, 1.1 * dpr);
      ctx.beginPath();
      ctx.moveTo(0, midY);
      ctx.lineTo(width, midY);
      ctx.stroke();
    }

    function resizeVisibleCanvas() {
      const canvas = track.children[1]?.querySelector('[data-role="wave"]');
      if (!canvas) return;
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(canvas.clientWidth * dpr);
      canvas.height = Math.floor(canvas.clientHeight * dpr);
    }

    function markSpeaker(panel, userId, speaking) {
      const avatar = panel.querySelector(`[data-user-id="${userId}"]`);
      if (avatar) avatar.classList.toggle('speaking', speaking);
    }

    function makeUser(index, label, color, minDelay, maxDelay, fallbackFreq) {
      return {
        id: `user-${index}`,
        label,
        color,
        minDelay,
        maxDelay,
        fallbackFreq,
        audioFiles: Array.from({ length: 5 }, (_, i) => `assets/audio/user${index}_${i + 1}.mp3`)
      };
    }

    function seeded(seed) {
      let value = seed * 9301 + 49297;
      return () => {
        value = (value * 233280 + 49297) % 233280;
        return value / 233280;
      };
    }

    function pickUsers(count, random) {
      const copy = [...USERS];
      const picked = [];
      while (copy.length && picked.length < count) {
        const index = Math.floor(random() * copy.length);
        picked.push(copy.splice(index, 1)[0]);
      }
      return picked;
    }

    function pickOne(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function showToast(message, duration = 1100) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }
  </script>
</body>
